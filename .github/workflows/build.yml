name: Build & Package

# Builds the PolyMon solution on Windows, stages the install payload, compiles
# the InnoSetup installer, and uploads setup.exe as an artifact. On tags it also
# attaches setup.exe to a GitHub Release.
#
# This is the gate for repo-hygiene Phase 2: once this workflow is green, the
# tracked bin/ binaries are provably regenerable and can be dropped from git.
#
# NOTE: assumes Phase 1 has merged (SNMP/Tester projects removed). All remaining
# solution projects target .NET Framework 4.8; third-party deps (ScottPlot) live
# in the tracked "3rd Party\" folder, so no NuGet restore is required.

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    env:
      SOLUTION: "PolyMon(CodePlex).sln"
      CONFIGURATION: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Pre-create monitor output dir
        run: New-Item -ItemType Directory -Force -Path "PolyMonManager\bin\Monitors" | Out-Null
        shell: pwsh

      - name: Build solution
        run: msbuild "$env:SOLUTION" /t:Build /p:Configuration=$env:CONFIGURATION /p:Platform="Any CPU" /p:SignManifests=false /m /nologo /v:minimal
        shell: pwsh

      - name: Stage install payload
        run: ./Build-PolyMonPackage.ps1
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
        shell: pwsh

      - name: Compile installer
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "$env:ProgramFiles\Inno Setup 6\ISCC.exe" }
          & $iscc "PolyMon-Setup.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }
        shell: pwsh

      - name: Locate setup.exe
        id: setup
        run: |
          $exe = Get-ChildItem -Path Output -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $exe) { throw "No setup.exe produced in Output\" }
          "path=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Built: $($exe.FullName) ($([math]::Round($exe.Length/1MB,2)) MB)"
        shell: pwsh

      - name: Upload setup.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: PolyMon-Setup
          path: ${{ steps.setup.outputs.path }}
          if-no-files-found: error
          retention-days: 30

      - name: Attach to Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.setup.outputs.path }}
          fail_on_unmatched_files: true
